const API_BASE =
  typeof window !== "undefined" && window.MFT_API_BASE
    ? window.MFT_API_BASE
    : "https://mftbackend-production.up.railway.app";

function getSessionId() {
  try {
    let id = localStorage.getItem("mft_session_id");
    if (!id) {
      id = "s_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
      localStorage.setItem("mft_session_id", id);
    }
    return id;
  } catch (e2) {
    return "anon";
  }
}
const SESSION_ID = getSessionId();

async function callBackend(endpoint, body) {
  const r = await fetch(API_BASE + endpoint, {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-Session-ID": SESSION_ID },
    body: JSON.stringify(body),
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw Object.assign(new Error(err.error || "server_error"), { status: r.status });
  }
  return r.json();
}

function TUTOR_PROMPT(immersion, cefrLevel, failCount = 0) {
  const lvl = LEVEL_CONTEXT[cefrLevel] || LEVEL_CONTEXT.A1;
  const ctx  = immersion ? lvl.fr : lvl.en;
  const lang = immersion ? "français" : "English";
  const modelAnswer = failCount >= 3
    ? (immersion
        ? "\n\n⚠️ L'élève a échoué 3 fois. Donne maintenant la réponse modèle complète en français."
        : "\n\n⚠️ The student has struggled 3 times. Now give the complete model answer in French.")
    : "";

  return (
    (immersion ? "Tu es professeur de français depuis 20 ans.\n\n" : "You are a French teacher with 20 years of experience.\n\n") +
    `STUDENT LEVEL: ${ctx}\n\n` +
    `ROLE: You simultaneously play the CHARACTER in the scene AND the TEACHER.\n\n` +
    `FORMAT — always use this exact structure:\n` +
    `[Your in-character French response]\n` +
    `---\n` +
    `[Teacher note in ${lang}: ONE correction or encouragement. Max 2 sentences. If no error, just say what was good.]` +
    modelAnswer + `\n\n` +
    `RULES:\n` +
    `- Never open with "Bien !" or "Excellent !" — be genuine and specific\n` +
    `- If French is correct: move the scene forward naturally, no correction needed\n` +
    `- If wrong: correct ONE thing only, show the right phrase in quotes\n` +
    `- If student asks a grammar question: answer it fully, then continue the scene\n` +
    `- Always end with something that naturally invites the student to respond`
  );
}

function STAR_PROMPT(immersion, currentStars) {
  const lang = immersion ? "français" : "English";
  return (
    `You are a French teacher. The student is replaying this scenario (current best: ${currentStars} ⭐).\n\n` +
    `After your usual in-character + teacher response, add exactly this JSON on its own line:\n` +
    `{"stars": 1|2|3}\n\n` +
    `STAR CRITERIA:\n` +
    `⭐ 1 — Completed. Significant errors or goal not achieved naturally.\n` +
    `⭐⭐ 2 — Good. Goal achieved, appropriate register, no blocking errors.\n` +
    `⭐⭐⭐ 3 — Excellent. Natural, idiomatic, clearly above the scenario level.\n\n` +
    `Never downgrade from ${currentStars} stars. Respond in ${lang}.`
  );
}

function getStars(entry) {
  if (!entry) return 0;
  if (typeof entry === "boolean") return 1; // legacy
  return entry.stars || 0;
}

function scenarioUnlocked(scenario, effectiveLevel) {
  return CEFR_RANK[scenario.cefrLevel] <= CEFR_RANK[effectiveLevel];
}

function getUnlockedLevel(progress, userLevel) {
  const counts = {};
  CEFR_ORDER.forEach(l => counts[l] = 0);
  SCENARIOS.forEach(s => { if (progress[s.id]) counts[s.cefrLevel]++; });

  let current = userLevel || "A1";
  for (let i = CEFR_RANK[current]; i < CEFR_ORDER.length - 1; i++) {
    const lvl = CEFR_ORDER[i];
    const scenariosAtLevel = SCENARIOS.filter(s => s.cefrLevel === lvl).length;
    if (counts[lvl] >= Math.max(1, Math.ceil(scenariosAtLevel / 2))) {
      current = CEFR_ORDER[i + 1];
    } else break;
  }
  return current;
}

function speakText(text, enabled) {
  if (!enabled || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "fr-FR";
  u.rate = 0.88;
  const voice = window.speechSynthesis.getVoices().find(v => v.lang.startsWith("fr"));
  if (voice) u.voice = voice;
  window.speechSynthesis.speak(u);
}

function ls(key, fallback) {
  try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : fallback; }
  catch (e3) { return fallback; }
}
function lsSet(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e4) {}
}

function useVoice({ onResult, onError }) {
  const ref = useRef(null);
  const [listening, setListening] = useState(false);

  const start = useCallback(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { onError(); return; }
    const r = new SR();
    r.lang = "fr-FR";
    r.continuous = false;
    r.interimResults = false;
    r.onresult = e => { onResult(e.results[0][0].transcript); setListening(false); };
    r.onerror = () => { onError(); setListening(false); };
    r.onend = () => setListening(false);
    ref.current = r;
    r.start();
    setListening(true);
  }, [onResult, onError]);

  const stop = useCallback(() => {
    _optionalChain([ref, 'access', _ => _.current, 'optionalAccess', _2 => _2.stop, 'call', _3 => _3()]);
    setListening(false);
  }, []);

  return { listening, start, stop };
}

function useSessionTracker() {
  const [sessions, setSessions] = useState(() => ls("mft_sessions", {}));

  const recordSession = useCallback(() => {
    const week = getWeekKey();
    setSessions(prev => {
      const updated = { ...prev, [week]: (prev[week] || 0) + 1 };
      lsSet("mft_sessions", updated);
      return updated;
    });
  }, []);

  const week = getWeekKey();
  return { thisWeek: sessions[week] || 0, recordSession };
}

function getWeekKey() {
  const d = new Date();
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${week}`;
}

function Flag({ w = 28, h = 16 }) {
  return (
    React.createElement('svg', { width: w, height: h, viewBox: "0 0 3 2"   , style: { flexShrink: 0, display: "block" },}
      , React.createElement('rect', { width: "1", height: "2", fill: "#002395",} )
      , React.createElement('rect', { x: "1", width: "1", height: "2", fill: "#fff",} )
      , React.createElement('rect', { x: "2", width: "1", height: "2", fill: "#ED2939",} )
    )
  );
}

function StarRow({ stars, size = 14 }) {
  return (
    React.createElement('div', { style: { display: "flex", gap: 2 },}
      , [1, 2, 3].map(i => (
        React.createElement('svg', { key: i, width: size, height: size, viewBox: "0 0 24 24"   ,}
          , React.createElement('polygon', {
            points: "12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"         ,
            fill: i <= stars ? C.star : C.grayLight,
            stroke: i <= stars ? C.star : C.grayLight,
            strokeWidth: "1",}
          )
        )
      ))
    )
  );
}
