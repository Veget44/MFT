const API_BASE =
  typeof window !== "undefined" && window.MFT_API_BASE
    ? window.MFT_API_BASE
    : "https://mftbackend-production.up.railway.app";

function getSessionId() {
  try {
    let id = localStorage.getItem("mft_session_id");
    if (!id) {
      id = "s_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
      localStorage.setItem("mft_session_id", id);
    }
    return id;
  } catch (e2) {
    return "anon";
  }
}
const SESSION_ID = getSessionId();

async function callBackend(endpoint, body) {
  const r = await fetch(API_BASE + endpoint, {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-Session-ID": SESSION_ID },
    body: JSON.stringify(body),
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw Object.assign(new Error(err.error || "server_error"), { status: r.status });
  }
  return r.json();
}

function TUTOR_PROMPT(immersion, cefrLevel, failCount) {
  var lvl = LEVEL_CONTEXT[cefrLevel] || LEVEL_CONTEXT.A1;
  var ctx  = immersion ? lvl.fr : lvl.en;
  var lang = immersion ? "francais" : "English";
  var f3   = (failCount || 0) >= 3
    ? (immersion ? "\n⚠️ 3 echecs. Donne la reponse modele complete maintenant."
                 : "\n⚠️ 3 failures. Give the complete model answer now.")
    : "";
  return (immersion ? "Professeur de francais (20 ans)." : "French teacher (20 years).")
    + "\nLEVEL: " + ctx
    + "\nROLE: Scene CHARACTER + brief TEACHER NOTE after each exchange."
    + "\nFORMAT: [French reply]\n---\n[" + lang + " note: 1 correction max, 2 sentences]" + f3
    + "\nRULES: No generic praise. Correct ONE thing in quotes if wrong. If correct: move scene forward. End with a natural prompt.";
}


function STAR_PROMPT(immersion, currentStars) {
  var lang = immersion ? "francais" : "English";
  return "French teacher. Replay (best: " + currentStars + "★).\n"
    + "Same FORMAT as usual, then add on its own line: {\"stars\": 1|2|3}\n"
    + "1★=done with errors. 2★=goal achieved, good register. 3★=natural+idiomatic.\n"
    + "Never downgrade. Reply in " + lang + ".";
}

};

function getStars(entry) {
  if (!entry) return 0;
  if (typeof entry === "boolean") return 1; // legacy
  return entry.stars || 0;
}

function scenarioUnlocked(scenario, effectiveLevel) {
  return CEFR_RANK[scenario.cefrLevel] <= CEFR_RANK[effectiveLevel];
}

function getUnlockedLevel(progress, userLevel) {
  const counts = {};
  CEFR_ORDER.forEach(l => counts[l] = 0);
  SCENARIOS.forEach(s => { if (progress[s.id]) counts[s.cefrLevel]++; });

  let current = userLevel || "A1";
  for (let i = CEFR_RANK[current]; i < CEFR_ORDER.length - 1; i++) {
    const lvl = CEFR_ORDER[i];
    const scenariosAtLevel = SCENARIOS.filter(s => s.cefrLevel === lvl).length;
    if (counts[lvl] >= Math.max(1, Math.ceil(scenariosAtLevel / 2))) {
      current = CEFR_ORDER[i + 1];
    } else break;
  }
  return current;
}

function speakText(text, enabled) {
  if (!enabled || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "fr-FR";
  u.rate = 0.88;
  const voice = window.speechSynthesis.getVoices().find(v => v.lang.startsWith("fr"));
  if (voice) u.voice = voice;
  window.speechSynthesis.speak(u);
}

function ls(key, fallback) {
  try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : fallback; }
  catch (e3) { return fallback; }
}
function lsSet(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e4) {}
}

function useVoice({ onResult, onError }) {
  const ref = useRef(null);
  const [listening, setListening] = useState(false);

  const start = useCallback(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { onError(); return; }
    const r = new SR();
    r.lang = "fr-FR";
    r.continuous = false;
    r.interimResults = false;
    r.onresult = e => { onResult(e.results[0][0].transcript); setListening(false); };
    r.onerror = () => { onError(); setListening(false); };
    r.onend = () => setListening(false);
    ref.current = r;
    r.start();
    setListening(true);
  }, [onResult, onError]);

  const stop = useCallback(() => {
    _optionalChain([ref, 'access', _ => _.current, 'optionalAccess', _2 => _2.stop, 'call', _3 => _3()]);
    setListening(false);
  }, []);

  return { listening, start, stop };
}

function useSessionTracker() {
  const [sessions, setSessions] = useState(() => ls("mft_sessions", {}));

  const recordSession = useCallback(() => {
    const week = getWeekKey();
    setSessions(prev => {
      const updated = { ...prev, [week]: (prev[week] || 0) + 1 };
      lsSet("mft_sessions", updated);
      return updated;
    });
  }, []);

  const week = getWeekKey();
  return { thisWeek: sessions[week] || 0, recordSession };
}

function getWeekKey() {
  const d = new Date();
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${week}`;
}

function Flag({ w = 28, h = 16 }) {
  return (
    React.createElement('svg', { width: w, height: h, viewBox: "0 0 3 2"   , style: { flexShrink: 0, display: "block" },}
      , React.createElement('rect', { width: "1", height: "2", fill: "#002395",} )
      , React.createElement('rect', { x: "1", width: "1", height: "2", fill: "#fff",} )
      , React.createElement('rect', { x: "2", width: "1", height: "2", fill: "#ED2939",} )
    )
  );
}

function StarRow({ stars, size = 14 }) {
  return (
    React.createElement('div', { style: { display: "flex", gap: 2 },}
      , [1, 2, 3].map(i => (
        React.createElement('svg', { key: i, width: size, height: size, viewBox: "0 0 24 24"   ,}
          , React.createElement('polygon', {
            points: "12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"         ,
            fill: i <= stars ? C.star : C.grayLight,
            stroke: i <= stars ? C.star : C.grayLight,
            strokeWidth: "1",}
          )
        )
      ))
    )
  );
}

function LevelChip({ level }) {
  // Uses French flag colors as identity
  const colors = {
    "0": { bg: "#E6EAF8", text: "#002395", border: "#002395" },
    A1:  { bg: "#E6EAF8", text: "#002395", border: "#002395" },
    A2:  { bg: "#EDF0FB", text: "#002395", border: "#002395" },
    B1:  { bg: "#FFF0F1", text: "#ED2939", border: "#ED2939" },
    B2:  { bg: "#FFF0F1", text: "#C8223A", border: "#ED2939" },
    C1:  { bg: "#141728", text: "#EEF0F8", border: "#141728" },
  };
  const { bg, text, border } = colors[level] || colors.A1;
  return (
    React.createElement('span', { style: {
      background: bg, color: text,
      border: `1px solid ${border}22`,
      fontFamily: "'DM Sans', sans-serif", fontWeight: 600, fontSize: 11,
      letterSpacing: 1.5, padding: "3px 8px", borderRadius: 4,
      textTransform: "uppercase",
    },}
      , level === "0" ? "Pré-A1" : level
    )
  );
}

function BackBtn({ onClick }) {
  return (
    React.createElement('button', { onClick: onClick, style: {
      background: "none", border: "none", cursor: "pointer",
      color: C.onHeaderDim, fontSize: 20, padding: "4px 8px",
      display: "flex", alignItems: "center",
    },}, "←"

    )
  );
}

function PlaceIllustration({ scenarioId }) {
  const img = SCENARIO_IMAGES[scenarioId];
  if (!img) return null;
  return (
    React.createElement('img', {
      src: img.src,
      width: 72, height: 72,
      style: { objectFit: "cover", borderRadius: 8, display: "block", flexShrink: 0 },}
    )
  );
}

function LoadingDots() {
  return (
    React.createElement('div', { style: { display: "flex", gap: 5, padding: "8px 0" },}
      , [0, 1, 2].map(i => (
        React.createElement('div', { key: i, style: {
          width: 7, height: 7, borderRadius: "50%",
          background: C.grayLight,
          animation: `pulse 1.2s ease-in-out ${i * 0.2}s infinite`,
        },} )
      ))
    )
  );
}


function Tricolor({ height = 3, style = {} }) {
  return (
    React.createElement('div', { style: { display: "flex", height, overflow: "hidden", borderRadius: 1, ...style },}
      , React.createElement('div', { style: { flex: 1, background: "#002395" },} )
      , React.createElement('div', { style: { flex: 1, background: "white" },} )
      , React.createElement('div', { style: { flex: 1, background: "#ED2939" },} )
    )
  );
}

  const go = s => setScreen(s);

  function saveProgress(p) { setProgress(p); lsSet("mft_progress", p); }
  function saveDiag(scenId, d) {
    setDiag(prev => {
      const updated = { ...prev, [scenId]: [...(prev[scenId] || []), d].slice(-10) };
      lsSet("mft_diag", updated);
      return updated;
    });

  function toggleImmersion() {

  }

  return (
    React.createElement('div', { style: { width: "100%", height: "100%", fontFamily: "'DM Sans', sans-serif", display: "flex", flexDirection: "column" },}

        , screen === "splash" && (

        , screen === "leveltest" && (
          React.createElement(LevelTestScreen, {
            immersion: immersion,
            onComplete: lvl => { setUserLevel(lvl); lsSet("mft_level", lvl); go("home"); },
            onBack: () => go("mode"),}
          )
        )

        , screen === "home" && (
          React.createElement(HomeScreen, {
            progress: progress,
            immersion: immersion,
            userLevel: userLevel,

            onComplete: (id, stars) => {
              saveProgress({ ...progress, [id]: { stars: Math.max(getStars(progress[id]), stars || 1), visits: (_optionalChain([progress, 'access', _47 => _47[id], 'optionalAccess', _48 => _48.visits]) || 0) + 1 } });
              go("home");
            },
            onDiag: saveDiag,

          )
        )

        , screen === "profile" && (
          React.createElement(ProfileScreen, {
            progress: progress,
            immersion: immersion,
            userLevel: userLevel,
            sessions: thisWeek,
            ttsEnabled: ttsEnabled,
            onBack: () => go("home"),
            onReset: () => { saveProgress({}); setDiag({}); lsSet("mft_diag", {}); go("home"); },
            onToggleMode: toggleImmersion,
            onToggleTTS: () => setTtsEnabled(v => !v),

            progress: progress,

            onBack: () => go("home"),}
          )
        )

      )
    )
  );
}
