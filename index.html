 function _optionalChain(ops) { let lastAccessLHS = undefined; let value = ops[0]; let i = 1; while (i < ops.length) { const op = ops[i]; const fn = ops[i + 1]; i += 2; if ((op === 'optionalAccess' || op === 'optionalCall') && value == null) { return undefined; } if (op === 'access' || op === 'optionalAccess') { lastAccessLHS = value; value = fn(value); } else if (op === 'call' || op === 'optionalCall') { value = fn((...args) => value.call(lastAccessLHS, ...args)); lastAccessLHS = undefined; } } return value; }

// ── Progression helpers ───────────────────────────────────────────────────────
// How many scenarios must be completed at a level to unlock the next
const UNLOCK_THRESHOLD = 2;

function getUnlockedLevel(progress, userLevel) {
  // Count completions per CEFR level
  const counts = {};
  CEFR_ORDER.forEach(l => counts[l] = 0);
  SCENARIOS.forEach(s => {
    if (progress[s.id]) counts[s.cefrLevel]++;
  });
  // Try to advance beyond userLevel
  let current = CEFR_RANK[userLevel];
  while (current < CEFR_ORDER.length - 1) {
    const lvl = CEFR_ORDER[current];
    if (counts[lvl] >= UNLOCK_THRESHOLD) current++;
    else break;
  }
  return CEFR_ORDER[current];
}

function scenarioUnlocked(scenario, effectiveLevel) {
  return CEFR_RANK[scenario.cefrLevel] <= CEFR_RANK[effectiveLevel];
}

// Stars per scenario: stored as progress[id] = { stars, visits }
function getStars(progressEntry) {
  if (!progressEntry) return 0;
  if (typeof progressEntry === "boolean") return 1; // legacy
  return progressEntry.stars || 0;
}

}

function useVoice({onResult,onError}){
  const ref=useRef(null);
  const [listening,setL]=useState(false);
  const start=useCallback(()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){onError();return;}
    const r=new SR();r.lang="fr-FR";r.continuous=false;r.interimResults=false;
    r.onresult=e=>{onResult(e.results[0][0].transcript);setL(false);};
    r.onerror=()=>{onError();setL(false);};r.onend=()=>setL(false);
    ref.current=r;r.start();setL(true);
  },[onResult,onError]);
  const stop=useCallback(()=>{_optionalChain([ref, 'access', _ => _.current, 'optionalAccess', _2 => _2.stop, 'call', _3 => _3()]);setL(false);},[]);
  return{listening,start,stop};
}
function speakText(t,on){
  if(!on||!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);u.lang="fr-FR";u.rate=0.88;
  const v=window.speechSynthesis.getVoices().find(x=>x.lang.startsWith("fr"));
  if(v)u.voice=v;window.speechSynthesis.speak(u);
}

function getWeekKey() {
  const d=new Date();
  const day=d.getUTCDay();
  const mon=new Date(Date.UTC(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate()-((day+6)%7)));
  return mon.toISOString().slice(0,10);
}
function useSessionTracker() {
  const [sessions,setSessions]=useState(()=>{
    try { return JSON.parse(localStorage.getItem("mft_sessions")||"{}"); } catch (e2){return {};}
  });
  const recordSession=useCallback(()=>{
    const week=getWeekKey();
    setSessions(prev=>{
      const updated={...prev,[week]:(prev[week]||0)+1};
      try{localStorage.setItem("mft_sessions",JSON.stringify(updated));}catch (e3){}
      return updated;
    });
  },[]);
  const thisWeek=sessions[getWeekKey()]||0;
  const lastSession=Object.keys(sessions).sort().pop();
  const daysSince=lastSession
    ?Math.floor((Date.now()-new Date(lastSession).getTime())/(1000*60*60*24))
    :null;
  return{thisWeek,daysSince,recordSession};
}

function DiagnosticsScreen({diagnostics,progress,immersion,apiKey,onBack}){
  const [activeWeakness,setActiveWeakness]=useState(null);
  const [exercise,setExercise]=useState(null);
  const [exerciseAnswer,setExerciseAnswer]=useState("");
  const [exerciseFeedback,setExerciseFeedback]=useState(null);
  const [feedbackLoading,setFeedbackLoading]=useState(false);

  const EXERCISE_BANK={
    "Passe compose vs imparfait":{
      tip:"Passé composé = completed action. Imparfait = background state or ongoing action.",
      instruction:"Fill in the correct past tense for each verb in brackets.",
      prompt:"Hier, je _______ (se lever) a 8h. Il _______ (faire) beau. Je _______ (prendre) mon cafe quand le telephone _______ (sonner).",
      example:"me suis leve(e) · faisait · prenais · a sonne"
    },
    "Missing articles (le/la/un/une)":{
      tip:"French nouns almost always need an article. 'J'ai chat' is wrong — 'J'ai un chat'.",
      instruction:"Add the correct article (le/la/les/un/une/des) in each gap.",
      prompt:"Je voudrais __ cafe et __ croissant. __ serveur arrive. C'est __ bonne boulangerie.",
      example:"un · un · Le · une"
    },
    "Wrong register (too informal)":{
      tip:"In formal situations: use 'vous', avoid slang, say 'je voudrais' not 'je veux'.",
      instruction:"Rewrite this message as if you're speaking to a bank advisor.",
      prompt:"'Salut, j'ai un probleme avec mon compte, t'as une solution ou quoi ?'",
      example:"'Bonjour Madame/Monsieur, j'aurais une question concernant mon compte bancaire...'"
    },
    "Subjonctif not triggered":{
      tip:"Subjunctive follows: il faut que, je veux que, bien que, pour que, avant que.",
      instruction:"Complete each sentence with the correct form — indicatif or subjonctif.",
      prompt:"Il faut que tu _______ (venir) demain. Je pense qu'il _______ (avoir) raison. Bien qu'elle _______ (etre) fatiguee, elle travaille.",
      example:"viennes · a · soit"
    },
    "Word order in questions":{
      tip:"Three ways to ask: intonation ('Tu viens ?'), est-ce que, or inversion ('Viens-tu ?').",
      instruction:"Transform this statement into a question three different ways.",
      prompt:"Tu parles francais.",
      example:"Tu parles francais ? / Est-ce que tu parles francais ? / Parles-tu francais ?"
    },
  };

  const getExercise=(weakness)=>{
    if(EXERCISE_BANK[weakness]) return EXERCISE_BANK[weakness];
    return{
      tip:"Focus on this pattern in your next sentence.",
      instruction:"Write 3 sentences in French that specifically practise: "+weakness,
      prompt:"Use real situations from the scenarios you've done — café, pharmacy, train station.",
      example:null
    };
  };

  const openExercise=(weakness)=>{
    setActiveWeakness(weakness);
    setExercise(getExercise(weakness));
    setExerciseAnswer("");
    setExerciseFeedback(null);
  };

  const submitExercise=async()=>{
    if(!exerciseAnswer.trim()||!exercise)return;
