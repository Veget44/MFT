// -- Progression helpers -
// How many scenarios must be completed at a level to unlock the next
const UNLOCK_THRESHOLD = 2;

function getUnlockedLevel(progress, userLevel) {
  const safeLevel = userLevel || "0";
  const counts = {};
  CEFR_ORDER.forEach(l => counts[l] = 0);
  SCENARIOS.forEach(s => {
    if (progress[s.id]) counts[s.cefrLevel]++;
  });
  let current = _nullishCoalesce(CEFR_RANK[safeLevel], () => ( 0));
  while (current < CEFR_ORDER.length - 1) {
    const lvl = CEFR_ORDER[current];
    if (counts[lvl] >= UNLOCK_THRESHOLD) current++;
    else break;
  }
  return CEFR_ORDER[current];
}

function scenarioUnlocked(scenario, effectiveLevel) {
  return CEFR_RANK[scenario.cefrLevel] <= CEFR_RANK[effectiveLevel];
}

// Stars per scenario: stored as progress[id] = { stars, visits }
function getStars(progressEntry) {
  if (!progressEntry) return 0;
  if (typeof progressEntry === "boolean") return 1; // legacy
  return progressEntry.stars || 0;
}

}

const TUTOR_PROMPT = (imm, isPreA1=false) => isPreA1
  ? `You are a warm French teacher. The student is an absolute beginner -- be brief and kind.
FORMAT: 2 sentences max.
Sentence 1: Did they attempt the objective? If yes, name exactly what they got right. If no, gently give the correct phrase in quotes.
Sentence 2 (only if needed): One tiny correction or word of encouragement.
NEVER: lists, grammar jargon, more than 2 sentences, hollow praise.
${imm?"Respond in very simple French.":"Respond in English."}`
  : imm
  ? `Tu es prof de francais. Direct, precis, chaleureux -- jamais de listes ni de "Excellent travail !".
FORMAT STRICT -- 2-3 phrases courtes maximum :
Ph1: L'eleve a-t-il repondu a l'objectif ? Oui -> dis ce qui marche. Non -> redirige avec la phrase correcte entre guillemets.
Ph2: Si erreur : UNE alternative correcte entre guillemets + regle en 5 mots max. Sinon : passe.
Ph3 (optionnelle): Micro-question pour relancer ou encouragement bref.
JAMAIS : listes, points, plus de 3 phrases, "c'est parfait".
Si anglais : signale-le, donne une amorce en francais.
Reponds en francais.`
  : `You are a French teacher. Direct, precise, warm -- no hollow praise, no lists.
STRICT FORMAT -- 2-3 short sentences max:
S1: Did the student address the objective? Yes -> name exactly what works. No -> redirect with the correct phrase in quotes.
S2: If grammar/vocab error: ONE correct alternative in quotes + rule in 5 words. Otherwise: skip.
S3 (optional): A micro-question to keep them going or brief encouragement.
NEVER: lists, bullet points, more than 3 sentences, "great job", "well done".
If they write in English: note it briefly, give a French opener.
Respond in English.`

// -- Whisper voice hook -
// Records audio via MediaRecorder, sends to Whisper API for transcription
// Falls back to browser SpeechRecognition if no OpenAI key
function useVoice({onResult,onError,openAiKey}){
  const mediaRef=useRef(null);
  const chunksRef=useRef([]);
  const [listening,setL]=useState(false);

  const startWhisper=useCallback(async()=>{
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      chunksRef.current=[];
      const mr=new MediaRecorder(stream,{mimeType:'audio/webm'});
      mr.ondataavailable=e=>{if(e.data.size>0)chunksRef.current.push(e.data);};
      mr.onstop=async()=>{
        stream.getTracks().forEach(t=>t.stop());
        const blob=new Blob(chunksRef.current,{type:'audio/webm'});
        const fd=new FormData();
        // Must be named 'audio' to match multer field name on server
        fd.append('audio',new File([blob],'audio.webm',{type:'audio/webm'}));
        try{
          const r=await fetch(API_BASE+'/transcribe',{
            method:'POST',
            headers:{'X-Session-ID':SESSION_ID},
            body:fd
          });
          if(!r.ok){onError();return;}
          const d=await r.json();
          if(d.text&&d.text.trim()) onResult(d.text.trim());
          else onError();
        }catch (e3){onError();}
        setL(false);
      };
      mediaRef.current=mr;
      mr.start();
      setL(true);
    }catch (e4){onError();setL(false);}
  },[onResult,onError,openAiKey]);

  const startNative=useCallback(()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){onError();return;}
    const r=new SR();r.lang="fr-FR";r.continuous=false;r.interimResults=false;
    r.onresult=e=>{onResult(e.results[0][0].transcript);setL(false);};
    r.onerror=()=>{onError();setL(false);};r.onend=()=>setL(false);
    r.start();setL(true);
  },[onResult,onError]);

  const start=useCallback(()=>{
    if(openAiKey&&openAiKey.startsWith('sk-')) startWhisper();
    else startNative();
  },[openAiKey,startWhisper,startNative]);

  const stop=useCallback(()=>{
    if(mediaRef.current&&mediaRef.current.state==='recording'){
      mediaRef.current.stop();
    }
    setL(false);
  },[]);

  return{listening,start,stop};
}
function speakText(t,on){
  if(!on||!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);u.lang="fr-FR";u.rate=0.88;
  const v=window.speechSynthesis.getVoices().find(x=>x.lang.startsWith("fr"));
  if(v)u.voice=v;window.speechSynthesis.speak(u);
}


// -- Responsive scale system 
// Global sz/sp functions -- work everywhere without needing a hook
// Reads window.innerWidth directly so atom components can use them too
function isPhone(){ return window.innerWidth < 480; }

function sz(base){
  if(!isPhone()) return base;
  if(base<=9)  return 12;
  if(base<=11) return 14;
  if(base<=13) return 15;
  if(base<=15) return 17;
  if(base<=18) return 20;
  return base;
}

function sp(base){
  if(!isPhone()) return base;
  if(base<=8)  return base+2;
  if(base<=16) return base+4;
  if(base<=24) return base+4;
  return base;
}

// useScreenSize -- triggers re-render when screen size changes
function useScreenSize(){
  const [,forceUpdate]=useState(0);
  useEffect(()=>{
    const handler=()=>forceUpdate(n=>n+1);
    window.addEventListener('resize',handler);
    return ()=>window.removeEventListener('resize',handler);
  },[]);
}

// -- Session tracking -
function getWeekKey() {
  const d=new Date();
  const day=d.getUTCDay();
  const mon=new Date(Date.UTC(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate()-((day+6)%7)));
  return mon.toISOString().slice(0,10);
}
function useSessionTracker() {
  const [sessions,setSessions]=useState(()=>{
    try { return JSON.parse(localStorage.getItem("mft_sessions")||"{}"); } catch (e5){return {};}
  });
  const recordSession=useCallback(()=>{
    const week=getWeekKey();
    setSessions(prev=>{
      const updated={...prev,[week]:(prev[week]||0)+1};
      try{localStorage.setItem("mft_sessions",JSON.stringify(updated));}catch (e6){}
      return updated;
    });
  },[]);
  const thisWeek=sessions[getWeekKey()]||0;
  const lastSession=Object.keys(sessions).sort().pop();
  const daysSince=lastSession
    ?Math.floor((Date.now()-new Date(lastSession).getTime())/(1000*60*60*24))
    :null;
  return{thisWeek,daysSince,recordSession};
}
