// -- Progression helpers -
// How many scenarios must be completed at a level to unlock the next
const UNLOCK_THRESHOLD = 2;

function getUnlockedLevel(progress, userLevel) {
  const safeLevel = userLevel || "0";
  const counts = {};
  CEFR_ORDER.forEach(l => counts[l] = 0);
  SCENARIOS.forEach(s => {
    if (progress[s.id]) counts[s.cefrLevel]++;
  });
  let current = _nullishCoalesce(CEFR_RANK[safeLevel], () => ( 0));
  while (current < CEFR_ORDER.length - 1) {
    const lvl = CEFR_ORDER[current];
    if (counts[lvl] >= UNLOCK_THRESHOLD) current++;
    else break;
  }
  return CEFR_ORDER[current];
}

function scenarioUnlocked(scenario, effectiveLevel) {
  return CEFR_RANK[scenario.cefrLevel] <= CEFR_RANK[effectiveLevel];
}

// Stars per scenario: stored as progress[id] = { stars, visits }
function getStars(progressEntry) {
  if (!progressEntry) return 0;

// -- Whisper voice hook -
// Records audio via MediaRecorder, sends to Whisper API for transcription
// Falls back to browser SpeechRecognition if no OpenAI key
function useVoice({onResult,onError}){
  const mediaRef=useRef(null);
  const chunksRef=useRef([]);
  const [listening,setL]=useState(false);

  const startWhisper=useCallback(async()=>{
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      chunksRef.current=[];
      const mr=new MediaRecorder(stream,{mimeType:'audio/webm'});
      mr.ondataavailable=e=>{if(e.data.size>0)chunksRef.current.push(e.data);};
      mr.onstop=async()=>{
        stream.getTracks().forEach(t=>t.stop());
        const blob=new Blob(chunksRef.current,{type:'audio/webm'});
        const fd=new FormData();
        // Must be named 'audio' to match multer field name on server
        fd.append('audio',new File([blob],'audio.webm',{type:'audio/webm'}));
        try{
          const r=await fetch(API_BASE+'/transcribe',{
            method:'POST',
            headers:{'X-Session-ID':SESSION_ID},
            body:fd
          });
          if(!r.ok){onError();return;}
          const d=await r.json();
          if(d.text&&d.text.trim()) onResult(d.text.trim());
          else onError();
        }catch (e3){onError();}
        setL(false);
      };
      mediaRef.current=mr;
      mr.start();
      setL(true);
    }catch (e4){onError();setL(false);}
  },[onResult,onError]);

  const startNative=useCallback(()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){onError();return;}
    const r=new SR();r.lang="fr-FR";r.continuous=false;r.interimResults=false;
    r.onresult=e=>{onResult(e.results[0][0].transcript);setL(false);};
    r.onerror=()=>{onError();setL(false);};r.onend=()=>setL(false);
    r.start();setL(true);
  },[onResult,onError]);

  const start=useCallback(()=>{
    startWhisper();
  },[startWhisper,startNative]);

  const stop=useCallback(()=>{
    if(mediaRef.current&&mediaRef.current.state==='recording'){
      mediaRef.current.stop();
    }
    setL(false);
  },[]);

  return{listening,start,stop};
}
function speakText(t,on){
  if(!on||!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);u.lang="fr-FR";u.rate=0.88;
  const v=window.speechSynthesis.getVoices().find(x=>x.lang.startsWith("fr"));
  if(v)u.voice=v;window.speechSynthesis.speak(u);
}


// -- Responsive scale system 
// Global sz/sp functions -- work everywhere without needing a hook
// Reads window.innerWidth directly so atom components can use them too
function isPhone(){ return window.innerWidth < 480; }

function sz(base){
  if(!isPhone()) return base;
  if(base<=9)  return 12;
  if(base<=11) return 14;
  if(base<=13) return 15;
  if(base<=15) return 17;
  if(base<=18) return 20;
  return base;
}

function sp(base){
  if(!isPhone()) return base;
  if(base<=8)  return base+2;
  if(base<=16) return base+4;
  if(base<=24) return base+4;
  return base;
}

// useScreenSize -- triggers re-render when screen size changes
function useScreenSize(){
  const [,forceUpdate]=useState(0);
  useEffect(()=>{
    const handler=()=>forceUpdate(n=>n+1);
    window.addEventListener('resize',handler);
    return ()=>window.removeEventListener('resize',handler);
  },[]);
}

// makeScale/makeSpace kept for backward compat but now just return the globals
function makeScale(){ return sz; }
function makeSpace(){ return sp; }

// -- Session tracking -
function getWeekKey() {
  const d=new Date();
  const day=d.getUTCDay();
  const mon=new Date(Date.UTC(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate()-((day+6)%7)));
  return mon.toISOString().slice(0,10);
}
function useSessionTracker() {
  const [sessions,setSessions]=useState(()=>{
    try { return JSON.parse(localStorage.getItem("mft_sessions")||"{}"); } catch (e5){return {};}
  });
  const recordSession=useCallback(()=>{
    const week=getWeekKey();
    setSessions(prev=>{
      const updated={...prev,[week]:(prev[week]||0)+1};
      try{localStorage.setItem("mft_sessions",JSON.stringify(updated));}catch (e6){}
      return updated;
    });
  },[]);
  const thisWeek=sessions[getWeekKey()]||0;
  const lastSession=Object.keys(sessions).sort().pop();
  const daysSince=lastSession
    ?Math.floor((Date.now()-new Date(lastSession).getTime())/(1000*60*60*24))
    :null;
  return{thisWeek,daysSince,recordSession};
}

function ProfileScreen({progress,immersion,userLevel,sessions,onBack,onReset,onToggleMode,onSettings,onRetakeTest,onDiagnostics}){
  const t=T(immersion);

  const totalStars=SCENARIOS.reduce((sum,s)=>sum+getStars(progress[s.id]),0);
  const maxStars=SCENARIOS.length*3;

  // Build skill coverage map
  const skillCoverage={};
  Object.keys(SKILLS).forEach(k=>skillCoverage[k]=0);
  SCENARIOS.forEach(s=>{
    const stars=getStars(progress[s.id]);
    if(stars>0) s.skills.forEach(sk=>{skillCoverage[sk]=(skillCoverage[sk]||0)+stars;});
  });

function App(){
  const [screen,setScreen]=useState("splash");

    try{return JSON.parse(localStorage.getItem("mft_progress")||"{}");}catch (e12){return{};}
  });
  const [diagnostics,setDiagnostics]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("mft_diag")||"{}");}catch (e13){return{};}
  });
  const [immersion,setImmersion]=useState(()=>{
    try{return localStorage.getItem("mft_immersion")==="1";}catch (e14){return false;}
  });

    try{return localStorage.getItem("mft_level")||null;}catch (e15){return null;}
  });
  const [ttsEnabled,setTtsEnabled]=useState(false);
  const {thisWeek,recordSession}=useSessionTracker();
  const go=s=>setScreen(s);

  const saveProgress=(newP)=>{
    setProgress(newP);
    try{localStorage.setItem("mft_progress",JSON.stringify(newP));}catch (e16){}
  };
  const saveDiag=(scenId,diag)=>{
    setDiagnostics(prev=>{
      const updated={...prev,[scenId]:[...(prev[scenId]||[]),diag].slice(-10)};
      try{localStorage.setItem("mft_diag",JSON.stringify(updated));}catch (e17){}
      return updated;
    });
  };

  return(
    React.createElement('div', { style: {width:"100%",height:"100%",fontFamily:"'DM Sans',sans-serif",display:"flex",flexDirection:"column"},}
      , React.createElement('style', null, CSS)
      , React.createElement('div', { style: {flex:1,overflow:"hidden"},}
        , screen==="splash"&&React.createElement(SplashScreen, { onEnter: ()=>go("mode"), immersion: immersion,})
        , screen==="mode"&&React.createElement(ModeScreen, { immersion: immersion,
          onSelect: mode=>{
            const imm=mode==="immersion";
            setImmersion(imm);
            try{localStorage.setItem("mft_immersion",imm?"1":"0");}catch (e18){}
            go("leveltest");
          },})
        , screen==="leveltest"&&React.createElement(LevelTestScreen, { immersion: immersion,
          onComplete: lvl=>{setUserLevel(lvl);try{localStorage.setItem("mft_level",lvl);}catch (e19){}go("home");},})
        , screen==="home"&&React.createElement(HomeScreen, { progress: progress, immersion: immersion,
          userLevel: userLevel||"B1", sessions: thisWeek,
          onSelect: s=>{setScenario(s);recordSession();go("scenario");},
          onProfile: ()=>go("profile"), onDiagnostics: ()=>go("diagnostics"), onToggleMode: ()=>setImmersion(m=>{const n=!m;try{localStorage.setItem("mft_immersion",n?"1":"0");}catch (e20){}return n;}),})
        , screen==="scenario"&&scenario&&React.createElement(ScenarioScreen, { key: scenario.id, scenario: scenario,
          immersion: immersion, ttsEnabled: ttsEnabled, progress: progress,
          onComplete: (newP)=>{saveProgress(newP);go("home");},
          onDiag: saveDiag, onBack: ()=>go("home"),})
        , screen==="profile"&&React.createElement(ProfileScreen, { progress: progress, immersion: immersion,
          userLevel: userLevel, sessions: thisWeek,
          onBack: ()=>go("home"),
          onReset: ()=>{saveProgress({});setUserLevel(null);try{localStorage.removeItem("mft_level");}catch (e21){}go("home");},
          onToggleMode: ()=>setImmersion(m=>{const n=!m;try{localStorage.setItem("mft_immersion",n?"1":"0");}catch (e22){}return n;}),
          onSettings: ()=>go("settings"),
          onRetakeTest: ()=>go("leveltest"),
          onDiagnostics: ()=>go("diagnostics"),})
        , screen==="diagnostics"&&React.createElement(DiagnosticsScreen, { diagnostics: diagnostics, progress: progress, immersion: immersion, onBack: ()=>go("profile"),})
        , screen==="settings"&&React.createElement(SettingsScreen, { ttsEnabled: ttsEnabled,
          onToggleTTS: ()=>setTtsEnabled(t=>!t),
          onBack: ()=>go("profile"), immersion: immersion,})
      )
    )
  );
}

root.render(React.createElement(App));
